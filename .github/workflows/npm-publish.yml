# 文件名必须与 npmjs.com → Package → Settings → Trusted publishing 中填写的
# 「Workflow filename」完全一致（含 .yml）。

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # secrets 不能用于 step 的 if（会报 Unrecognized named-value: 'secrets'），改为 job env + shell 分支
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # Trusted publishing 要求 Node ≥22.14 且 npm CLI ≥11.5.1（见 npm 文档）
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          REF="${GITHUB_REF_NAME}"
          TAG_VER="${REF#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag is ${REF} but package.json version is ${PKG_VER}. Run \`npm version\` and push the new tag."
            exit 1
          fi

      - run: npm ci

      # Trusted publishing 需要 npm ≥11.5.1（Node 22 自带的 npm 可能不够新）
      - name: Ensure npm for Trusted publishing
        run: npm install -g "npm@^11.5.1"

      # 未配置 NPM_TOKEN 时不导出 NODE_AUTH_TOKEN，npm 使用 Trusted Publisher（OIDC）
      - name: Publish to npm
        run: |
          if [ -n "${NPM_PUBLISH_TOKEN}" ]; then
            export NODE_AUTH_TOKEN="${NPM_PUBLISH_TOKEN}"
          fi
          npm publish --access public
